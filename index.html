<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-card">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username">
                <p class="error" id="userError">Username is required</p>
            </div>

            <div class="input-group">
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="Password">
                    <button type="button" id="toggleBtn">Show</button>
                </div>
                <p class="error" id="passError">Password is required</p>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>
        <div id="successMsg" class="success-box">Success! Work submitted.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
